<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Staf — Buku Induk</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="page-root" hidden>
  <div class="card">
    <div class="card-head">
      <div>
        <h3>Data Staf</h3>
        <div class="desc">Master data staf/tenaga kependidikan Prodi Administrasi Perkantoran.</div>
      </div>
      <div class="card-tools">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M20 20l-4.7-4.7"/></svg>
          <input type="text" id="searchBox" placeholder="Cari NIP / nama...">
        </div>
        <button class="btn btn-primary" id="btnTambah">+ Tambah Staf</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="ledger">
        <thead><tr><th>NIP</th><th>Nama</th><th>Jabatan</th><th>Email</th><th>No. HP</th><th style="width:90px;">Aksi</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalForm">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Tambah Staf</h3>
      <button class="modal-close" id="btnCloseModal">&times;</button>
    </div>
    <form id="formStaf">
      <div class="modal-body">
        <div class="form-grid">
          <div class="field full">
            <label>NIP</label>
            <input type="text" id="f_nip" required>
          </div>
          <div class="field full">
            <label>Nama Lengkap</label>
            <input type="text" id="f_nama" required>
          </div>
          <div class="field full">
            <label>Jabatan</label>
            <input type="text" id="f_jabatan" placeholder="contoh: Kepala Tata Usaha">
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" id="f_email">
          </div>
          <div class="field">
            <label>No. HP</label>
            <input type="text" id="f_no_hp">
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-outline" id="btnBatal">Batal</button>
        <button type="submit" class="btn btn-primary" id="btnSimpan">Simpan</button>
      </div>
    </form>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
const user = Shell.mount({ active: "staf", eyebrow: "Manajemen Data", title: "Data Staf", roles: ["admin"] });
document.getElementById("btnTambah").innerHTML = `${ICON.plus}Tambah Staf`;

let DATA = [];

async function loadData() {
  const tbody = document.getElementById("tbody");
  setLoading(tbody, 6);
  try {
    DATA = await Api("listStaf", {});
    render();
  } catch (err) { showErr(err); setEmpty(tbody, 6, "Gagal memuat data."); }
}

function render() {
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  const rows = DATA.filter(r => !q || String(r.nip).toLowerCase().includes(q) || String(r.nama).toLowerCase().includes(q));
  const tbody = document.getElementById("tbody");
  if (!rows.length) return setEmpty(tbody, 6, "Tidak ada data staf.");
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="mono">${escapeHtml(r.nip)}</td>
      <td>${escapeHtml(r.nama)}</td>
      <td>${escapeHtml(r.jabatan)}</td>
      <td>${escapeHtml(r.email)}</td>
      <td class="mono">${escapeHtml(r.no_hp)}</td>
      <td>
        <div class="row-actions">
          <button class="icon-btn" title="Ubah" onclick='openForm(${JSON.stringify(r).replace(/'/g, "&#39;")})'>${ICON.edit}</button>
          <button class="icon-btn danger" title="Hapus" onclick="hapus('${escapeHtml(r.nip)}')">${ICON.trash}</button>
        </div>
      </td>
    </tr>
  `).join("");
}

document.getElementById("searchBox").addEventListener("input", render);

function openForm(data) {
  document.getElementById("formStaf").reset();
  document.getElementById("f_nip").value = data ? data.nip : "";
  document.getElementById("f_nip").disabled = !!data;
  document.getElementById("f_nama").value = data ? data.nama : "";
  document.getElementById("f_jabatan").value = data ? data.jabatan : "";
  document.getElementById("f_email").value = data ? data.email : "";
  document.getElementById("f_no_hp").value = data ? data.no_hp : "";
  document.getElementById("modalTitle").textContent = data ? "Ubah Data Staf" : "Tambah Staf";
  openModal("modalForm");
}

document.getElementById("btnTambah").addEventListener("click", () => openForm(null));
document.getElementById("btnCloseModal").addEventListener("click", () => closeModal("modalForm"));
document.getElementById("btnBatal").addEventListener("click", () => closeModal("modalForm"));

document.getElementById("formStaf").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn = document.getElementById("btnSimpan");
  btn.disabled = true; btn.textContent = "Menyimpan...";
  try {
    await Api("simpanStaf", {
      nip: document.getElementById("f_nip").value.trim(),
      nama: document.getElementById("f_nama").value.trim(),
      jabatan: document.getElementById("f_jabatan").value.trim(),
      email: document.getElementById("f_email").value.trim(),
      no_hp: document.getElementById("f_no_hp").value.trim(),
    });
    toast("Data staf berhasil disimpan.");
    closeModal("modalForm");
    loadData();
  } catch (err) { showErr(err); }
  finally { btn.disabled = false; btn.textContent = "Simpan"; }
});

async function hapus(nip) {
  const ok = await confirmDialog(`Hapus data staf NIP ${nip}? Tindakan ini tidak dapat dibatalkan.`, { title: "Hapus Staf" });
  if (!ok) return;
  try {
    await Api("hapusStaf", { nip });
    toast("Data staf dihapus.");
    loadData();
  } catch (err) { showErr(err); }
}

loadData();
</script>
</body>
</html>
